<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI File Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <h1>🧠 AI File Dashboard</h1>
    <p>Drag & drop a file or click to upload</p>

    <!-- DROPZONE -->
    <div id="dropzone" class="dropzone">
      <input type="file" id="fileInput" hidden />
      <p>📂 Drop file here or click to select</p>
    </div>

    <button onclick="uploadFile()">Analyze File</button>

    <!-- STATUS -->
    <div id="status"></div>

    <!-- RESULT -->
    <div id="result"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
